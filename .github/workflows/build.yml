name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Install clippy
      run: rustup component add clippy
    - name: Clippy (workspace, lib + bins + tests, -D warnings)
      run: cargo clippy --workspace --lib --bins --tests -- -D warnings
    - name: Clippy (rayon-off path, -D warnings)
      run: cargo clippy -p retia --no-default-features --features storage-sqlite --lib --tests -- -D warnings

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Build (default)
      run: cargo build -p retia --release --verbose
    - name: Test (default)
      run: cargo test -p retia --release --verbose
    - name: Test (rayon-off path)
      run: cargo test -p retia --no-default-features --features storage-sqlite --verbose
